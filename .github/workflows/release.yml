name: Release

# Cuts a release on every semver tag (e.g. v0.1.0). Each platform job publishes a
# self-contained agent and runs `vpk pack` on its matching OS (Velopack packages
# for the host OS), then a single publish job attaches everything to one GitHub
# Release — which is exactly the feed the agent reads via Velopack's GithubSource.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # create the GitHub Release + upload assets

env:
  VPK_VERSION: '1.2.0'
  DOTNET_VERSION: '8.0.x'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Install vpk
        run: |
          dotnet tool install -g vpk --version "$VPK_VERSION"
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Pack win-x64
        run: bash scripts/pack.sh "${GITHUB_REF_NAME#v}" win-x64
      - uses: actions/upload-artifact@v5
        with:
          name: releases-win-x64
          path: dist/releases/
          retention-days: 7

  build-macos:
    runs-on: macos-latest   # Apple Silicon runner cross-builds both mac arches
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Install vpk
        run: |
          dotnet tool install -g vpk --version "$VPK_VERSION"
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Pack osx-arm64 + osx-x64
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/pack.sh "$VERSION" osx-arm64
          bash scripts/pack.sh "$VERSION" osx-x64
      - uses: actions/upload-artifact@v5
        with:
          name: releases-macos
          path: dist/releases/
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - uses: actions/checkout@v5

      - name: Collect all release artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist/releases
          pattern: releases-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "==> Release assets:"
          ls -1 dist/releases/

          # Everything else in dist/releases/ is Velopack update-feed data
          # (*.nupkg, releases.*.json, RELEASES-*) the app's auto-updater reads —
          # not meant for a human to click. Surface just the 3 installers up top.
          BASE_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME"
          {
            echo "## Quick downloads"
            echo
            echo "| Platform | Installer |"
            echo "|---|---|"
            echo "| 🪟 Windows | [HshAgent-win-x64-Setup.exe]($BASE_URL/HshAgent-win-x64-Setup.exe) |"
            echo "| 🍎 macOS (Apple Silicon) | [HshAgent-osx-arm64-Setup.pkg]($BASE_URL/HshAgent-osx-arm64-Setup.pkg) |"
            echo "| 🍎 macOS (Intel) | [HshAgent-osx-x64-Setup.pkg]($BASE_URL/HshAgent-osx-x64-Setup.pkg) |"
            echo
            echo "The other files below (\`*.nupkg\`, \`releases.*.json\`) are Velopack's update feed, used by the app's auto-updater — you don't need them for a manual install."
            echo
            gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" -f "tag_name=$GITHUB_REF_NAME" --jq .body
          } > release-notes.md

          gh release create "$GITHUB_REF_NAME" dist/releases/* \
            --title "HSH Agent $VERSION" \
            --notes-file release-notes.md \
            --latest
